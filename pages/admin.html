<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2KC Admin Dashboard</title>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <h2>🎓 2KC Admin</h2>

        <ul>

            <li class="active">📊 Dashboard</li>

            <li>👨‍🎓 Học sinh</li>

            <li>🏆 Bảng xếp hạng</li>

            <li>📢 Thông báo</li>

            <li>📅 Lịch học</li>

            <li>⚙️ Cài đặt</li>

            <li>🚪 Đăng xuất</li>

        </ul>

    </aside>

    <main class="main">

        <h1>Dashboard</h1>

        <div class="dashboard-cards">

            <div class="dashboard-card">

                <h2 id="studentCount">0</h2>

                <p>Học sinh</p>

            </div>

            <div class="dashboard-card">

                <h2 id="noticeCount">0</h2>

                <p>Thông báo</p>

            </div>

            <div class="dashboard-card">

                <h2 id="rankingCount">0</h2>

                <p>Xếp hạng</p>

            </div>

        </div>

        <div class="dashboard-content">

            <h2>Xin chào 👋</h2>

            <p>Chào mừng bạn đến với bảng điều khiển quản trị 2KC.</p>

        </div>

    </main>

</div>

<script src="../script.js"></script>

</body>

</html>
